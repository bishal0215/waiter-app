<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Waiter App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .login-header {
            background: #2563eb;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="login-header">
        <div style="font-size:2.5rem;">🍽️</div>
        <h4 class="mb-0 mt-2 fw-bold">Waiter App</h4>
        <small class="opacity-75">Sign in to continue</small>
    </div>
    <div class="card-body p-4">
        {% if form.errors %}
            <div class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-circle"></i> Invalid username or password.
            </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg"
                       placeholder="Enter username" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold">
                Login
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
