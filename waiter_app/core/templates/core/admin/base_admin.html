<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Admin{% endblock %} — Waiter App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: #1e293b;
            position: fixed;
            top: 0; left: 0;
            padding: 1.5rem 1rem;
            z-index: 100;
        }
        .sidebar .brand {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0.5rem 0.75rem;
            margin-bottom: 1.5rem;
            display: block;
            text-decoration: none;
        }
        .sidebar .nav-link {
            color: #94a3b8;
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #334155;
            color: white;
        }
        .sidebar .nav-label {
            color: #475569;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 0.5rem 0.75rem;
            margin-top: 1rem;
        }
        .main-content {
            margin-left: 240px;
            padding: 2rem;
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="{% url 'admin_dashboard' %}" class="brand">⚙️ Admin Panel</a>

    <div class="nav-label">Overview</div>
    <a href="{% url 'admin_dashboard' %}"
       class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{% url 'admin_orders' %}"
       class="nav-link {% if request.resolver_match.url_name == 'admin_orders' %}active{% endif %}">
        <i class="bi bi-receipt"></i> Orders
    </a>

    <div class="nav-label">Manage</div>
    <a href="{% url 'admin_permissions' %}"
         class="nav-link {% if 'permission' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-shield-check"></i> Permissions
   </a>
    <a href="{% url 'admin_users' %}"
       class="nav-link {% if 'user' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-people"></i> Users
    </a>
    <a href="{% url 'admin_menu' %}"
       class="nav-link {% if 'menu' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-egg-fried"></i> Menu Items
    </a>
    <a href="{% url 'admin_tables' %}"
       class="nav-link {% if 'table' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-grid"></i> Tables
    </a>

    <div class="nav-label">App</div>
    <a href="{% url 'dashboard' %}" class="nav-link">
        <i class="bi bi-shop"></i> Waiter View
    </a>
    <a href="{% url 'kitchen' %}" class="nav-link">
        <i class="bi bi-fire"></i> Kitchen View
    </a>
    <a href="{% url 'logout' %}" class="nav-link text-danger">
        <i class="bi bi-box-arrow-left"></i> Logout
    </a>
</div>

<!-- Main Content -->
<div class="main-content">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}
                        alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
